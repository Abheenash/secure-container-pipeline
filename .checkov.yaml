# Checkov config. `skip-check` is a REVIEWED baseline — each entry is an accepted
# risk for this demo project, with a reason. Everything else is a hard gate: any new
# category of misconfiguration in a PR fails the build.
directory:
  - terraform
compact: true
quiet: true
skip-check:
  - CKV_AWS_2 # ALB is HTTP, not HTTPS — demo has no domain/ACM cert
  - CKV_AWS_260 # ALB SG allows :80 from 0.0.0.0/0 — it is the public entry point, by design
  - CKV_AWS_382 # SG egress to 0.0.0.0/0 — required to reach the VPC endpoints (no internet route exists)
  - CKV_AWS_150 # ALB deletion protection off — stack is intentionally destroyed between demos
  - CKV_AWS_91 # ALB access logging off — would add an S3 log bucket; out of scope for the demo
  - CKV_AWS_119 # DynamoDB uses AWS-managed SSE, not a CMK — acceptable for the demo
  - CKV_AWS_158 # CloudWatch Logs use the AWS-managed key, not a CMK — acceptable for the demo
  - CKV_AWS_149 # Secrets Manager uses the AWS-managed key, not a CMK — acceptable for the demo
